<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tend — Your life, on autopilot.</title>
  <meta name="description" content="An AI agent that books your haircuts, calls restaurants, schedules check-ups, and runs the rest of your life. Set it and forget it." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=DM+Sans:opsz,wght@9..40,300..700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#F5EFE0',
            ink: '#1F1B16',
            ink2: '#3A332B',
            sage: '#6B8E5A',
            sageDim: '#849B73',
            clay: '#C97B5C',
            stone: '#D8CFB8',
            stoneDim: '#E7DFCA',
          },
          fontFamily: {
            display: ['Fraunces', 'serif'],
            body: ['"DM Sans"', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    html, body { background: #F5EFE0; color: #1F1B16; font-family: 'DM Sans', sans-serif; margin: 0; }
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    .grain::after {
      content: ""; position: absolute; inset: 0; pointer-events: none; opacity: 0.05;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      mix-blend-mode: multiply;
    }

    /* iPhone frame */
    .phone {
      width: 390px; height: 800px; border-radius: 56px;
      background: linear-gradient(180deg, #18130c 0%, #0a0805 100%);
      padding: 14px;
      box-shadow:
        0 70px 90px -30px rgba(31,27,22,0.35),
        0 20px 40px -10px rgba(31,27,22,0.25),
        inset 0 0 0 1px rgba(255,255,255,0.05);
      position: relative;
    }
    .phone::before {
      content: ""; position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      width: 100px; height: 30px; background: #000; border-radius: 20px; z-index: 5;
    }
    .screen {
      width: 100%; height: 100%; border-radius: 44px; overflow: hidden;
      background: #F5EFE0; position: relative;
    }

    .pulse-dot {
      animation: pulse-dot 1.6s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.45; transform: scale(1.12); }
    }

    .wave-bar { animation: wave 1.2s ease-in-out infinite; }
    @keyframes wave {
      0%, 100% { height: 8px; }
      50% { height: 24px; }
    }

    .marquee-row { animation: marquee 60s linear infinite; }
    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    ::selection { background: #1F1B16; color: #F5EFE0; }

    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
<script>window.Motion = window.FramerMotion || window.Motion;</script>

<!-- Icons -->
<script type="text/babel">
  function Ic({ d, w=20, h=20, stroke='currentColor', sw=1.8, fill='none' }) {
    return <svg width={w} height={h} viewBox="0 0 24 24" fill={fill} stroke={stroke} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"><path d={d} /></svg>;
  }
  const icons = {
    phone: 'M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.72 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.35 1.85.59 2.81.72A2 2 0 0 1 22 16.92z',
    calendar: 'M19 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zM16 2v4M8 2v4M3 10h18',
    plus: 'M12 5v14M5 12h14',
    arrow: 'M5 12h14M13 5l7 7-7 7',
    check: 'M20 6L9 17l-5-5',
    refresh: 'M3 12a9 9 0 0 1 15-6.7L21 8M21 3v5h-5M21 12a9 9 0 0 1-15 6.7L3 16M3 21v-5h5',
    sparkle: 'M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1',
    scissors: 'M6 9a3 3 0 1 1 0-6 3 3 0 0 1 0 6zM6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM20 4 8.12 15.88M14.47 14.48 20 20M8.12 8.12 12 12',
    settings: 'M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z',
  };
  window.Ic = Ic;
  window.icons = icons;
</script>

<!-- Phone screen / app prototype -->
<script type="text/babel">
  const { motion, AnimatePresence } = window.Motion;
  const Ic = window.Ic;
  const icons = window.icons;

  function StatusBar({ time = '9:41' }) {
    return (
      <div className="flex items-center justify-between px-7 pt-3 pb-1 text-[12px] font-medium text-ink">
        <span>{time}</span>
        <div className="flex items-center gap-1">
          <span className="w-4 h-3 inline-block rounded-sm bg-ink/80"></span>
          <span className="text-ink/70">·</span>
          <span className="text-ink/70">100%</span>
        </div>
      </div>
    );
  }

  function ActiveCallCard() {
    const D = window.DEMO.active;
    const [step, setStep] = React.useState(0);
    const max = D.transcript.length;

    React.useEffect(() => {
      if (step >= max) return;
      const t = setTimeout(() => setStep(s => s + 1), 1900);
      return () => clearTimeout(t);
    }, [step, max]);

    const lines = D.transcript.slice(0, step);
    const isDone = step >= max;

    return (
      <div className="mx-4 rounded-[28px] bg-ink text-cream p-5 relative overflow-hidden">
        <div className="absolute inset-0 opacity-[0.04]" style={{
          background: "url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>\")"
        }}></div>

        <div className="relative flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <div className="w-7 h-7 rounded-full bg-sage flex items-center justify-center">
              <span className="w-2 h-2 rounded-full bg-cream pulse-dot"></span>
            </div>
            <div>
              <div className="text-[10px] tracking-[0.2em] text-cream/55 font-medium uppercase">{isDone ? 'Done' : 'Live call'}</div>
              <div className="font-display text-base leading-tight">{D.place} <span className="text-cream/55">{D.placeNote}</span></div>
            </div>
          </div>
          <div className="flex items-end gap-[3px] h-6">
            {[0,1,2,3,4].map(i => (
              <span key={i} className="w-[3px] bg-cream/80 rounded-sm wave-bar" style={{ animationDelay: `${i * 0.15}s` }}></span>
            ))}
          </div>
        </div>

        <div className="relative mt-5 max-h-[210px] overflow-hidden">
          <AnimatePresence initial={false}>
            {lines.map((l, i) => (
              <motion.div
                key={i}
                initial={{ opacity: 0, y: 10 }}
                animate={{ opacity: i < lines.length - 1 ? 0.45 : 1, y: 0 }}
                transition={{ duration: 0.4 }}
                className="mb-2 flex gap-2 items-start"
              >
                <span className={`text-[9px] tracking-[0.15em] mt-1 font-semibold uppercase shrink-0 ${l.who === 'tend' ? 'text-sageDim' : 'text-cream/45'}`}>
                  {l.who === 'tend' ? 'tend' : 'shop'}
                </span>
                <span className="text-[13px] leading-tight font-body text-cream/90">{l.text}</span>
              </motion.div>
            ))}
          </AnimatePresence>
        </div>

        {isDone && (
          <motion.div
            initial={{ opacity: 0, y: 8 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ delay: 0.2, duration: 0.5 }}
            className="relative mt-2 pt-3 border-t border-cream/15 flex items-center justify-between"
          >
            <div>
              <div className="text-[10px] tracking-[0.2em] text-cream/55 uppercase">Booked</div>
              <div className="font-display text-sm">{D.outcome}</div>
            </div>
            <div className="w-9 h-9 rounded-full bg-sage flex items-center justify-center">
              <Ic d={icons.check} stroke="#F5EFE0" w={14} h={14} sw={3} />
            </div>
          </motion.div>
        )}
      </div>
    );
  }

  function CompletedItem({ t }) {
    const Icon = icons[t.icon] || icons.calendar;
    return (
      <div className="flex items-center gap-3 px-1 py-3 border-b border-ink/10 last:border-b-0">
        <div className="w-10 h-10 rounded-full bg-stoneDim flex items-center justify-center shrink-0">
          <Ic d={Icon} stroke="#3A332B" w={16} h={16} sw={1.8} />
        </div>
        <div className="flex-1 min-w-0">
          <div className="font-display text-[15px] leading-tight text-ink">{t.title}</div>
          <div className="text-[12px] text-ink/55 leading-tight mt-0.5 truncate">{t.when} · {t.who}</div>
        </div>
        <div className="text-[10px] tracking-wider uppercase text-ink/40">{t.duration}</div>
      </div>
    );
  }

  function Recurring({ items }) {
    const tones = {
      sage: 'bg-sage/15 text-sage',
      stone: 'bg-stone text-ink2',
      clay: 'bg-clay/20 text-clay',
    };
    return (
      <div className="px-4 mt-4">
        <div className="flex items-center justify-between mb-2">
          <div className="text-[10px] tracking-[0.25em] uppercase text-ink/55 font-medium">Recurring</div>
          <div className="text-[10px] tracking-[0.2em] uppercase text-ink/40">3 active</div>
        </div>
        <div className="grid grid-cols-3 gap-2">
          {items.map(r => (
            <div key={r.label} className={`rounded-2xl p-3 ${tones[r.tone] || tones.stone}`}>
              <div className="font-display text-[15px] leading-none">{r.label}</div>
              <div className="text-[10px] mt-1 font-medium opacity-80">{r.every}</div>
              <div className="text-[10px] mt-3 font-medium opacity-60">next · {r.next}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  function PhoneApp() {
    return (
      <div className="phone">
        <div className="screen flex flex-col">
          <StatusBar />
          <div className="px-5 pt-2 pb-3 flex items-center justify-between">
            <div>
              <div className="font-display italic text-3xl leading-none text-ink">Today</div>
              <div className="text-xs text-ink/50 mt-1">Tuesday · Mar 24</div>
            </div>
            <div className="flex items-center gap-2">
              <button className="w-9 h-9 rounded-full bg-stoneDim flex items-center justify-center">
                <Ic d={icons.settings} stroke="#3A332B" w={16} sw={1.8} />
              </button>
              <button className="w-9 h-9 rounded-full bg-ink text-cream flex items-center justify-center">
                <Ic d={icons.plus} stroke="#F5EFE0" w={16} sw={2.2} />
              </button>
            </div>
          </div>

          <ActiveCallCard />

          <div className="px-4 mt-5">
            <div className="flex items-center justify-between mb-1">
              <div className="text-[10px] tracking-[0.25em] uppercase text-ink/55 font-medium">Completed today</div>
              <div className="text-[10px] tracking-[0.2em] uppercase text-ink/40">{window.DEMO.completed.length}</div>
            </div>
            <div>
              {window.DEMO.completed.map(t => <CompletedItem key={t.title} t={t} />)}
            </div>
          </div>

          <Recurring items={window.DEMO.recurring} />

          <div className="flex-1"></div>

          <div className="px-4 pb-6 pt-3">
            <button className="w-full h-12 rounded-full bg-ink text-cream font-medium text-sm flex items-center justify-center gap-2">
              <Ic d={icons.sparkle} stroke="#F5EFE0" w={14} sw={1.8} />
              Tell tend what to do
            </button>
          </div>
        </div>
      </div>
    );
  }
  window.PhoneApp = PhoneApp;
</script>

<!-- Page -->
<script type="text/babel">
  const { motion } = window.Motion;
  const Ic = window.Ic;
  const icons = window.icons;

  function Nav() {
    return (
      <header className="absolute top-0 left-0 right-0 z-30 px-6 md:px-12 py-6 flex items-center justify-between">
        <div className="flex items-center gap-2.5">
          <div className="w-9 h-9 rounded-full bg-ink flex items-center justify-center">
            <span className="font-display italic text-cream text-lg leading-none">t</span>
          </div>
          <span className="font-display italic text-2xl text-ink leading-none">tend</span>

        <nav className="hidden md:flex items-center gap-8 text-sm text-ink/70 font-body">

  }

  function Hero() {
    return (
      <section className="relative min-h-screen overflow-hidden pt-28 pb-12 grain">
        <Nav />
        <div className="absolute inset-0 pointer-events-none" style={{ background: 'radial-gradient(ellipse at 80% 20%, rgba(201,123,92,0.12) 0%, transparent 50%), radial-gradient(ellipse at 20% 80%, rgba(107,142,90,0.08) 0%, transparent 50%)' }}></div>

        <div className="relative max-w-7xl mx-auto px-6 md:px-10 grid md:grid-cols-2 gap-8 md:gap-12 items-center">
          <div>
            <motion.div
              initial={{ opacity: 0, y: 16 }} animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 0.8, delay: 0.1, ease: 'easeOut' }}
              className="inline-flex items-center gap-2 bg-stoneDim rounded-full px-3.5 py-1.5"
            >
              <span className="w-1.5 h-1.5 rounded-full bg-sage pulse-dot"></span>
              <span className="text-[11px] tracking-[0.15em] uppercase font-medium text-ink/75">Private beta · early invites</span>
            </motion.div>

            <motion.h1
              initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 1, delay: 0.2, ease: [0.16,1,0.3,1] }}
              className="mt-6 font-display text-ink leading-[0.92] tracking-[-0.02em]"
              style={{ fontSize: 'clamp(3rem, 7vw, 5.5rem)' }}
            >
              Set your life<br/>
              on <span className="italic font-light">autopilot</span>.
            </motion.h1>

            <motion.p
              initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 1, delay: 0.4, ease: 'easeOut' }}
              className="mt-6 text-lg md:text-xl text-ink/70 leading-snug max-w-xl"
            >
              Tend is an AI agent that <em className="font-display">actually calls</em> businesses on your behalf — books your haircuts, dentist, oil changes, dinner reservations — and drops the confirmations straight onto your calendar. Tell it once. It runs forever.
            </motion.p>

            <motion.div
              initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }}
              transition={{ duration: 1, delay: 0.55, ease: 'easeOut' }}
              className="mt-8 flex flex-col sm:flex-row items-start sm:items-center gap-3 sm:gap-4"
            >
              <a href="#waitlist" className="bg-ink text-cream rounded-full px-6 py-3.5 text-base font-medium hover:bg-ink2 transition-colors inline-flex items-center gap-2">
                Get early access <Ic d={icons.arrow} w={16} sw={2} />
              </a>
              <a href="#how" className="text-ink/80 hover:text-ink text-base font-medium inline-flex items-center gap-2 px-2">
                See it work
              </a>
            </motion.div>

            <motion.div
              initial={{ opacity: 0 }} animate={{ opacity: 1 }}
              transition={{ duration: 1, delay: 0.8 }}
              className="mt-12 flex items-center gap-6 text-xs text-ink/55"
            >
              <div className="flex items-center gap-2">
                <Ic d={icons.phone} w={13} sw={2} /> Real calls
              </div>
              <div className="flex items-center gap-2">
                <Ic d={icons.calendar} w={13} sw={2} /> Auto-calendar
              </div>
              <div className="flex items-center gap-2">
                <Ic d={icons.refresh} w={13} sw={2} /> Set & forget

          </div>

          <motion.div
            initial={{ opacity: 0, y: 40, scale: 0.98 }}
            animate={{ opacity: 1, y: 0, scale: 1 }}

            className="flex justify-center md:justify-end"
          >
            <window.PhoneApp />
          </motion.div>
        </div>
      </section>
    );
  }

  function Marquee() {
    const items = ['Haircut every 5 weeks', 'Dentist twice a year', 'Oil change quarterly', 'Birthday dinner reservations', 'Recurring grocery delivery', 'Annual physical', 'House cleaning every Friday', 'Pet grooming monthly', 'Dry cleaning pickup', 'Eye exam annually'];
    const doubled = [...items, ...items];
    return (
      <div className="relative overflow-hidden py-6 border-y border-ink/10 bg-cream">
        <div className="marquee-row flex gap-10 whitespace-nowrap text-ink/65 font-display italic text-2xl md:text-3xl" style={{ width: 'max-content' }}>
          {doubled.map((s, i) => (
            <span key={i} className="flex items-center gap-10">
              {s}
              <span className="text-clay">●</span>
            </span>
          ))}
        </div>
      </div>
    );
  }

  function HowItWorks() {
    const steps = [
      {
        n: '01',
        t: 'Tell it once.',
        b: 'Say what you need in plain English. "Book a haircut every five weeks, anywhere good in the Mission, Thursdays preferred."',
      },
      {
        n: '02',
        t: 'It calls. Like a person.',
        b: "Tend dials the business, navigates IVRs, asks for openings, answers questions, books the slot. Most calls take under three minutes.",
      },
      {
        n: '03',
        t: 'You see it on your calendar.',
        b: "The appointment appears in your calendar with a confirmation, the address, and a recording you can listen back to. You don't lift a finger.",
      },
      {
        n: '04',
        t: 'It just keeps going.',
        b: "Next time the cycle comes around, tend handles it again. Set rules once — preferred barber, dietary needs, parking instructions — and it remembers.",
      },
    ];
    return (
      <section id="how" className="relative py-24 md:py-36 px-6 md:px-12 bg-cream grain overflow-hidden">
        <div className="max-w-6xl mx-auto">
          <div className="text-[11px] tracking-[0.25em] uppercase text-ink/55 mb-6 font-medium">/ How it works</div>
          <h2 className="font-display text-ink leading-[0.95] tracking-[-0.02em] max-w-3xl" style={{ fontSize: 'clamp(2.25rem, 5.5vw, 4.5rem)' }}>
            The boring stuff,<br/>handled <span className="italic font-light">while you sleep</span>.
          </h2>

          <div className="mt-20 grid grid-cols-1 md:grid-cols-2 gap-y-14 gap-x-16">
            {steps.map(s => (
              <div key={s.n}>
                <div className="font-display text-clay text-xl mb-3">{s.n}</div>
                <h3 className="font-display text-3xl md:text-4xl text-ink tracking-[-0.01em] leading-[0.95]">{s.t}</h3>
                <p className="mt-4 text-base md:text-lg text-ink/70 leading-snug max-w-md">{s.b}</p>
              </div>
            ))}
          </div>
        </div>
      </section>
    );
  }

  function UseCases() {
    const cases = [
      { icon: 'scissors', label: 'Haircut', detail: 'Every 5 weeks · preferred barber · 3pm window' },
      { icon: 'sparkle', label: 'Dentist', detail: 'Every 6 months · cleaning + checkup · Dr. Patel' },
      { icon: 'refresh', label: 'Oil change', detail: 'Every 4 months · Tesla service · pickup' },
      { icon: 'calendar', label: 'Restaurant', detail: 'Birthday dinner · party of 4 · windowed' },
      { icon: 'phone', label: 'Doctor follow-ups', detail: 'Auto-reschedule cancellations' },
      { icon: 'settings', label: 'House services', detail: 'Plumber · pest · cleaner · all you' },
    ];
    return (
      <section id="use-cases" className="relative py-24 md:py-36 px-6 md:px-12 bg-stoneDim grain overflow-hidden">
        <div className="max-w-6xl mx-auto">
          <div className="text-[11px] tracking-[0.25em] uppercase text-ink/60 mb-6 font-medium">/ Use cases</div>
          <h2 className="font-display text-ink leading-[0.95] tracking-[-0.02em] max-w-3xl" style={{ fontSize: 'clamp(2.25rem, 5.5vw, 4.5rem)' }}>
            Anything <span className="italic font-light">a phone call</span> can do, tend can do for you.
          </h2>

          <div className="mt-20 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
            {cases.map(c => (
              <div key={c.label} className="bg-cream rounded-3xl p-6 flex flex-col gap-4 min-h-[170px]">
                <div className="w-11 h-11 rounded-full bg-ink flex items-center justify-center">
                  <Ic d={window.icons[c.icon]} stroke="#F5EFE0" w={18} sw={1.8} />
                </div>
                <div>
                  <div className="font-display text-2xl text-ink leading-none">{c.label}</div>
                  <div className="mt-2 text-sm text-ink/65 leading-snug">{c.detail}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>
    );
  }

  function Faq() {
    const items = [
      { q: 'Will the business know it\'s an AI?', a: 'Yes — tend opens every call by identifying itself as your AI assistant. We don\'t deceive anyone. Most businesses don\'t mind; the call still gets the booking made.' },
      { q: 'What if the call goes off-script?', a: 'tend handles the long tail — IVRs, hold music, transfers, questions about insurance. If a call hits a dead end, you get a notification with the transcript and one-tap to call back manually.' },
      { q: 'How does pricing work?', a: 'A flat monthly subscription. No per-call charges. Unlimited recurring tasks. Early-access pricing locked in for life.' },
      { q: 'What about my calendar and contacts?', a: 'tend connects to Google Calendar or Apple Calendar via standard OAuth. We never read past events. Contacts stay on your device.' },
      { q: 'Is this US-only?', a: 'Beta launches in US/Canada. EU and UK in Q3. Numbers outside North America are deferred until we map IVRs in those locales.' },
    ];
    return (
      <section id="faq" className="relative py-24 md:py-36 px-6 md:px-12 bg-cream overflow-hidden">
        <div className="max-w-3xl mx-auto">
          <div className="text-[11px] tracking-[0.25em] uppercase text-ink/55 mb-6 font-medium">/ Questions</div>
          <h2 className="font-display text-ink leading-[0.95] tracking-[-0.02em]" style={{ fontSize: 'clamp(2.25rem, 5vw, 4rem)' }}>
            Things people <span className="italic font-light">always ask</span>.
          </h2>
          <div className="mt-14 divide-y divide-ink/10 border-t border-ink/10">
            {items.map((q, i) => (
              <details key={i} className="group py-6">
                <summary className="cursor-pointer list-none flex items-start justify-between gap-6">
                  <span className="font-display text-xl md:text-2xl text-ink leading-tight tracking-[-0.01em]">{q.q}</span>
                  <span className="shrink-0 w-8 h-8 rounded-full bg-stoneDim flex items-center justify-center transition-transform group-open:rotate-45">
                    <Ic d={icons.plus} stroke="#3A332B" w={14} sw={2} />
                  </span>
                </summary>
                <p className="mt-4 text-base md:text-lg text-ink/70 leading-snug max-w-xl">{q.a}</p>
              </details>
            ))}
          </div>
        </div>
      </section>
    );
  }

  function Waitlist() {
    const [email, setEmail] = React.useState('');
    const [status, setStatus] = React.useState('idle');

    const submit = (e) => {
      e.preventDefault();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setStatus('error'); return; }
      try {
        const list = JSON.parse(localStorage.getItem('tend_waitlist') || '[]');
        list.push({ email, ts: Date.now() });
        localStorage.setItem('tend_waitlist', JSON.stringify(list));
        setStatus('ok');
      } catch { setStatus('error'); }
    };

    return (
      <section id="waitlist" className="relative py-24 md:py-32 px-6 md:px-12 bg-ink text-cream overflow-hidden grain">
        <div className="absolute inset-0 pointer-events-none" style={{ background: 'radial-gradient(ellipse at 50% 50%, rgba(201,123,92,0.18) 0%, transparent 60%)' }}></div>
        <div className="relative max-w-3xl mx-auto text-center">
          <div className="text-[11px] tracking-[0.25em] uppercase text-cream/55 mb-6 font-medium">/ Join the beta</div>
          <h2 className="font-display leading-[0.95] tracking-[-0.02em]" style={{ fontSize: 'clamp(2.5rem, 5.5vw, 5rem)' }}>
            Take your life <span className="italic font-light text-clay">back</span>.
          </h2>
          <p className="mt-6 text-lg md:text-xl text-cream/75 max-w-xl mx-auto leading-snug">
            Early invites going out monthly. Get on the list, tell us what tasks would change your week.
          </p>

          {status === 'ok' ? (
            <div className="mt-10 inline-flex items-center gap-3 rounded-full bg-cream/10 px-6 py-3.5">
              <span className="w-7 h-7 rounded-full bg-sage flex items-center justify-center">
                <Ic d={icons.check} stroke="#1F1B16" w={14} sw={3} />
              </span>
              <span className="text-base text-cream">You're on the list. We'll be in touch.</span>
            </div>
          ) : (
            <form onSubmit={submit} className="mt-10 flex flex-col sm:flex-row items-stretch gap-2 max-w-md mx-auto">
              <input
                type="email" required value={email} onChange={(e) => setEmail(e.target.value)}
                placeholder="you@youremail.com"
                className="flex-1 rounded-full bg-cream/8 border border-cream/20 px-5 py-3.5 text-base text-cream placeholder:text-cream/40 focus:outline-none focus:border-cream/40"
              />
              <button type="submit" className="rounded-full bg-cream text-ink px-6 py-3.5 text-base font-medium hover:bg-stone transition-colors inline-flex items-center justify-center gap-1.5 whitespace-nowrap">
                Request invite <Ic d={icons.arrow} w={15} sw={2} />
              </button>
            </form>
          )}
          {status === 'error' && <p className="mt-4 text-sm text-clay">Enter a valid email.</p>}

          <p className="mt-8 text-xs text-cream/40">No spam. We'll only email when your invite is ready.</p>
        </div>
      </section>
    );
  }

  function Footer() {
    return (
      <footer className="relative bg-cream py-10 px-6 md:px-12 border-t border-ink/10">
        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-ink/55">
          <div className="flex items-center gap-2">
            <div className="w-6 h-6 rounded-full bg-ink flex items-center justify-center">
              <span className="font-display italic text-cream text-xs leading-none">t</span>
            </div>
            <span>© 2026 tend · made in California</span>
          </div>
          <div className="flex items-center gap-6 text-xs tracking-wide">
            <a href="#" className="hover:text-ink">Privacy</a>
            <a href="#" className="hover:text-ink">Terms</a>
            <a href="mailto:hello@tend.app" className="hover:text-ink">hello@tend.app</a>
          </div>
        </div>
      </footer>
    );
  }

  function App() {
    return (
      <React.Fragment>
        <Hero />
        <Marquee />
        <HowItWorks />
        <UseCases />
        <Faq />
        <Waitlist />
        <Footer />
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
