name: Cusp
options:
  bundleIdPrefix: com.superfuture
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: 9U2Z82V2J7
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UIUserInterfaceStyle: Dark
    INFOPLIST_KEY_CFBundleDisplayName: Cusp
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  Cusp:
    type: application
    platform: iOS
    sources:
      - path: Cusp
        excludes:
          - "**/.DS_Store"
      - path: Resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.superfuture.cusp
        PRODUCT_NAME: Cusp
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1"
