<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#3F3858"/>
      <stop offset="55%" stop-color="#2A2B4C"/>
      <stop offset="100%" stop-color="#1A1B3A"/>
    </radialGradient>
    <radialGradient id="moon" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F5EDDC"/>
      <stop offset="60%" stop-color="#D4B26F"/>
      <stop offset="100%" stop-color="#AE8A46"/>
    </radialGradient>
  </defs>

  <!-- Cosmic background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Soft glow behind moon -->
  <circle cx="430" cy="540" r="350" fill="#D4B26F" opacity="0.18"/>

  <!-- Crescent moon: outer circle minus inner offset circle -->
  <mask id="cresc">
    <rect width="1024" height="1024" fill="white"/>
    <circle cx="560" cy="500" r="220" fill="black"/>
  </mask>
  <circle cx="430" cy="540" r="260" fill="url(#moon)" mask="url(#cresc)"/>

  <!-- Sparkle -->
  <g transform="translate(720,320)">
    <path d="M0 -60 L8 -8 L60 0 L8 8 L0 60 L-8 8 L-60 0 L-8 -8 Z"
          fill="#F5EDDC"/>
  </g>
  <g transform="translate(820,440)">
    <path d="M0 -28 L4 -4 L28 0 L4 4 L0 28 L-4 4 L-28 0 L-4 -4 Z"
          fill="#F5EDDC" opacity="0.7"/>
  </g>
  <g transform="translate(680,720)">
    <path d="M0 -18 L3 -3 L18 0 L3 3 L0 18 L-3 3 L-18 0 L-3 -3 Z"
          fill="#B8A4D4" opacity="0.85"/>
  </g>

  <!-- Tiny stars -->
  <circle cx="200" cy="200" r="3" fill="#F5EDDC" opacity="0.7"/>
  <circle cx="850" cy="220" r="2" fill="#F5EDDC" opacity="0.6"/>
  <circle cx="900" cy="800" r="3" fill="#F5EDDC" opacity="0.5"/>
  <circle cx="180" cy="820" r="2" fill="#B8A4D4" opacity="0.6"/>
  <circle cx="120" cy="500" r="2.5" fill="#F5EDDC" opacity="0.4"/>
</svg>
