<!-- FadingVideo -->
<script type="text/babel">
  function FadingVideo({ src, className, style }) {
    const videoRef = React.useRef(null);
    const rafRef = React.useRef(null);
    const fadingOutRef = React.useRef(false);

    const FADE_MS = 500;
    const FADE_OUT_LEAD = 0.55;

    const fadeTo = (target, duration) => {
      const video = videoRef.current;
      if (!video) return;
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      const start = performance.now();
      const startOpacity = parseFloat(video.style.opacity || '0');
      const delta = target - startOpacity;
      const animate = (now) => {
        const elapsed = now - start;
        const t = Math.min(1, elapsed / duration);
        video.style.opacity = String(startOpacity + delta * t);
        if (t < 1) rafRef.current = requestAnimationFrame(animate);
      };
      rafRef.current = requestAnimationFrame(animate);
    };

    React.useEffect(() => {
      const video = videoRef.current;
      if (!video) return;
      video.style.opacity = '0';

      const onLoaded = () => {
        video.style.opacity = '0';
        video.play().catch(() => {});
        fadeTo(1, FADE_MS);
      };
      const onTime = () => {
        if (!video.duration) return;
        const remaining = video.duration - video.currentTime;
        if (!fadingOutRef.current && remaining <= FADE_OUT_LEAD && remaining > 0) {
          fadingOutRef.current = true;
          fadeTo(0, FADE_MS);
        }
      };
      const onEnded = () => {
        video.style.opacity = '0';
        setTimeout(() => {
          video.currentTime = 0;
          video.play().catch(() => {});
          fadingOutRef.current = false;
          fadeTo(1, FADE_MS);
        }, 100);
      };

      video.addEventListener('loadeddata', onLoaded);
      video.addEventListener('timeupdate', onTime);
      video.addEventListener('ended', onEnded);
      return () => {
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        video.removeEventListener('loadeddata', onLoaded);
        video.removeEventListener('timeupdate', onTime);
        video.removeEventListener('ended', onEnded);
      };
    }, [src]);

    return (
      <video
        ref={videoRef}
        src={src}
        autoPlay
        muted
        playsInline
        preload="auto"
        className={className}
        style={{ opacity: 0, ...style }}
      />
    );
  }
  window.FadingVideo = FadingVideo;
</script>

<!-- BlurText -->
<script type="text/babel">
  function BlurText({ text, className }) {
    const m = window.Motion;
    const motion = m.motion;
    const ref = React.useRef(null);
    const [visible, setVisible] = React.useState(false);

    React.useEffect(() => {
      if (!ref.current) return;
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) { setVisible(true); obs.disconnect(); }
        });
      }, { threshold: 0.1 });
      obs.observe(ref.current);
      return () => obs.disconnect();
    }, []);

    const words = text.split(' ');
    return (
      <p ref={ref} className={className} style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}>
        {words.map((word, i) => (
          <motion.span
            key={i}
            style={{ display: 'inline-block', marginRight: '0.28em' }}
            initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
            animate={visible ? {
              filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
              opacity: [0, 0.5, 1],
              y: [50, -5, 0]
            } : {}}
            transition={{
              duration: 0.7,
              times: [0, 0.5, 1],
              ease: 'easeOut',
              delay: (i * 100) / 1000
            }}
          >
            {word}
          </motion.span>
        ))}
      </p>
    );
  }
  window.BlurText = BlurText;
</script>
