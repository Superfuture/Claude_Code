<!-- FadingVideo -->
<script type="text/babel">
  function FadingVideo({ src, className, style }) {
    const videoRef = React.useRef(null);
    const rafRef = React.useRef(null);
    const fadingOutRef = React.useRef(false);
    const FADE_MS = 500;
    const FADE_OUT_LEAD = 0.55;
    const fadeTo = (target, duration) => {
      const v = videoRef.current; if (!v) return;
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      const start = performance.now();
      const so = parseFloat(v.style.opacity || '0');
      const dt = target - so;
      const step = (now) => {
        const t = Math.min(1, (now - start) / duration);
        v.style.opacity = String(so + dt * t);
        if (t < 1) rafRef.current = requestAnimationFrame(step);
      };
      rafRef.current = requestAnimationFrame(step);
    };
    React.useEffect(() => {
      const v = videoRef.current; if (!v) return;
      v.style.opacity = '0';
      const onLoaded = () => { v.style.opacity = '0'; v.play().catch(()=>{}); fadeTo(1, FADE_MS); };
      const onTime = () => {
        if (!v.duration) return;
        const r = v.duration - v.currentTime;
        if (!fadingOutRef.current && r <= FADE_OUT_LEAD && r > 0) {
          fadingOutRef.current = true; fadeTo(0, FADE_MS);
        }
      };
      const onEnded = () => {
        v.style.opacity = '0';
        setTimeout(() => { v.currentTime = 0; v.play().catch(()=>{}); fadingOutRef.current = false; fadeTo(1, FADE_MS); }, 100);
      };
      v.addEventListener('loadeddata', onLoaded);
      v.addEventListener('timeupdate', onTime);
      v.addEventListener('ended', onEnded);
      return () => {
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        v.removeEventListener('loadeddata', onLoaded);
        v.removeEventListener('timeupdate', onTime);
        v.removeEventListener('ended', onEnded);
      };
    }, [src]);
    return <video ref={videoRef} src={src} autoPlay muted playsInline preload="auto" className={className} style={{ opacity: 0, ...style }} />;
  }
  window.FadingVideo = FadingVideo;
</script>

<!-- BlurText -->
<script type="text/babel">
  function BlurText({ text, className }) {
    const motion = window.Motion.motion;
    const ref = React.useRef(null);
    const [visible, setVisible] = React.useState(false);
    React.useEffect(() => {
      if (!ref.current) return;
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(e => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } });
      }, { threshold: 0.1 });
      obs.observe(ref.current);
      return () => obs.disconnect();
    }, []);
    const words = text.split(' ');
    return (
      <p ref={ref} className={className} style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}>
        {words.map((word, i) => (
          <motion.span key={i}
            style={{ display: 'inline-block', marginRight: '0.28em' }}
            initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
            animate={visible ? { filter: ['blur(10px)','blur(5px)','blur(0px)'], opacity: [0,0.5,1], y: [50,-5,0] } : {}}
            transition={{ duration: 0.7, times: [0,0.5,1], ease: 'easeOut', delay: (i*100)/1000 }}
          >{word}</motion.span>
        ))}
      </p>
    );
  }
  window.BlurText = BlurText;
</script>
