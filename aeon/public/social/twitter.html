<!doctype html>
<html lang="en"><head>
<meta charset="UTF-8" />
<title>Aeon · Twitter/X Header 1500×500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
<style>
  html, body { width: 1500px; height: 500px; }
  .stage { position: relative; width: 1500px; height: 500px; background: #000; overflow: hidden; }
  .glow { left: 50%; top: 50%; transform: translate(-50%, -45%); width: 1100px; height: 700px; background: radial-gradient(ellipse at 50% 50%, rgba(232,218,189,0.22) 0%, rgba(232,218,189,0.06) 30%, transparent 65%); filter: blur(60px); position: absolute; pointer-events: none; }
</style>
</head>
<body>
<div class="stage grain">
  <div class="glow"></div>

  <div style="position: absolute; top: 28px; left: 60px; display: flex; align-items: center; gap: 10px;">
    <div style="width: 36px; height: 36px; border-radius: 9999px; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; box-shadow: inset 0 1px 1px rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.08);">
      <span class="heading" style="font-size: 22px; line-height: 1;">a</span>
    </div>
    <span class="mono" style="font-size: 10px; color: rgba(255,255,255,0.55);">AEON · BRAND</span>
  </div>

  <div style="position: absolute; top: 28px; right: 60px; display: inline-flex; align-items: center; gap: 8px; padding: 4px 4px 4px 10px; border-radius: 9999px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);">
    <span class="mono" style="font-size: 10px; color: rgba(255,255,255,0.7);">PRE-LAUNCH · 2026</span>
    <span style="background: #E8DABD; color: #000; border-radius: 9999px; padding: 3px 10px; font-size: 9px; font-weight: 600; letter-spacing: 0.15em;">SOON</span>
  </div>

  <div style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px;">
    <div class="heading" style="font-size: 220px; line-height: 0.85; letter-spacing: -10px; color: #fff; position: relative;">
      Aeon<span class="heading" style="font-size: 60px; color: #E8DABD; position: absolute; top: 22px; right: -36px;">*</span>
    </div>
    <div class="hairline" style="width: 80px; margin: 28px 0;"></div>
    <div class="heading" style="font-size: 32px; line-height: 1; letter-spacing: -0.7px; color: rgba(255,255,255,0.9); text-align: center;">
      AI for humanity's greatest challenges.
    </div>
  </div>

  <div style="position: absolute; left: 60px; bottom: 24px;" class="mono">
    <span style="font-size: 10px; color: rgba(255,255,255,0.4);">/ FOR THE NEXT THOUSAND YEARS</span>
  </div>
  <div style="position: absolute; right: 60px; bottom: 24px;" class="mono">
    <span style="font-size: 10px; color: rgba(255,255,255,0.4);">@AEON · AEON.AI</span>
  </div>
</div>
</body></html>
